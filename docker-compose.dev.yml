version: '3.8'

services:
  # PostgreSQL 数据库 - 开发环境
  postgres:
    image: postgres:15-alpine
    container_name: noiquest_postgres_dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-noi_quest}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-noi_quest}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
