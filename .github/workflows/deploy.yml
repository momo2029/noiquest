name: Build and Deploy NOIQuest

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: crpi-1e1v7t6udr8xqx6k.cn-beijing.personal.cr.aliyuncs.com
  NAMESPACE: cobola
  IMAGE_NAME: noiquest
  REMOTE_DIR: /opt/noiquest
  DEPLOY_SERVER: app-hw2.tail030d37.ts.net

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ github.event.head_commit.message }}
          generate_release_notes: false

  deploy:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_DEPLOY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ env.DEPLOY_SERVER }} >> ~/.ssh/known_hosts

      - name: Create remote directory
        run: |
          ssh root@${{ env.DEPLOY_SERVER }} "mkdir -p ${{ env.REMOTE_DIR }}"
      
      - name: Copy configuration files
        run: |
          scp -r ${{ env.REMOTE_DIR }}/* root@${{ env.DEPLOY_SERVER }}:${{ env.REMOTE_DIR }}/ || true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY_DEPLOY }}
          timeout: 60s
          command_timeout: 5m
          script: |
            cd ${{ env.REMOTE_DIR }}
            
            # Pull latest images
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}-backend:latest
            docker pull ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}-frontend:latest
            
            # Update environment files
            cat > deploy/.env << 'EOF'
            # 数据库配置 - 使用海外数据库 dbhw1
            DATABASE_URL=postgresql://noiquest_user:5vB7sK2pG9dR4mQ6zW8@dbhw1.tail030d37.ts.net:8899/noiquest_db?schema=public&sslmode=require
            POSTGRES_USER=noiquest_user
            POSTGRES_PASSWORD=5vB7sK2pG9dR4mQ6zW8
            POSTGRES_DB=noiquest_db
            
            # JWT 密钥
            JWT_SECRET=n78349817234*#@¥7234
            JWT_EXPIRES_IN=7d
            
            # 服务器配置
            PORT=3001
            NODE_ENV=production
            
            # 豆包 API 配置
            DOUBAO_API_KEY=59a1214d-18e9-4627-8141-6c5dc830c6e2
            DOUBAO_API_URL=https://ark.cn-beijing.volces.com/api/v3/chat/completions
            DOUBAO_MODEL=ep-20260125183402-9m6cr
            
            # C++执行器KEY
            CPPEXEC=http://cpp-exec:4002
            CPPEXEC_KEY='liuahjlkdfbna543$334k'
            
            # 跨域配置 - 海外部署
            CORS_ORIGIN=https://noiquest.com,https://www.noiquest.com
            
            # SMTP 邮件配置
            SMTP_SERVER=smtpdm.aliyun.com
            SMTP_PORT=465
            SMTP_USER=no-reply@mail.3198.net
            SMTP_PASS=7sK9pR2tG5bN8mQ7zW3x
            EMAIL_FROM=no-reply@mail.3198.net
            EOF
            
            # Deploy with Docker Compose
            docker compose -f deploy/docker-compose.yml down
            docker compose -f deploy/docker-compose.yml up -d
            
            # Wait for services to start
            sleep 10
            
            # Run database migrations
            docker exec noiquest_backend npx prisma db push --skip-generate || true
            
            # Check service status
            docker ps --filter name=noiquest --format "table {{.Names}}\t{{.Status}}"

  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    env:
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - name: Send deployment notification
        if: ${{ env.FEISHU_WEBHOOK != '' }}
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          method: POST
          contentType: application/json
          data: |
            {
              "msg_type": "post",
              "content": {
                "post": {
                  "zh_cn": {
                    "title": "NOIQuest 部署完成",
                    "content": [
                      [{"tag": "text", "text": "仓库: ${{ github.repository }}"}],
                      [{"tag": "text", "text": "分支: ${{ github.ref_name }}"}],
                      [{"tag": "text", "text": "服务器: ${{ env.DEPLOY_SERVER }}"}],
                      [{"tag": "text", "text": "提交人: ${{ github.actor }}"}],
                      [{"tag": "text", "text": "部署结果: ${{ needs.deploy.result }}"}]
                    ]
                  }
                }
              }
            }