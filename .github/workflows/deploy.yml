name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建镜像'
        type: boolean
        default: true

env:
  REGISTRY: crpi-1e1v7t6udr8xqx6k.cn-beijing.personal.cr.aliyuncs.com
  NAMESPACE: cobola
  IMAGE_NAME: noiquest
  REMOTE_DIR: /opt/noiquest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='frontend/.env' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.REMOTE_DIR }}/

      - name: Deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /opt/noiquest/deploy && docker compose down && docker compose up -d --build"
          sleep 10
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /opt/noiquest/deploy && docker compose ps"

      - name: Send notification
        if: always()
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          method: POST
          contentType: application/json
          data: |
            {
              "msg_type": "text",
              "content": {
                "text": "✅ NOIQuest 部署完成\n🔗 仓库: ${{ github.repository }}\n🌿 分支: ${{ github.ref_name }}\n🧪 状态: ${{ job.status }}\n👤 提交人: ${{ github.actor }}"
              }
            }
