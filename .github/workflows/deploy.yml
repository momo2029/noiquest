name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建镜像'
        type: boolean
        default: true

env:
  REGISTRY: ${{ secrets.REGISTRY }}
  NAMESPACE: ${{ secrets.NAMESPACE }}
  IMAGE_NAME: noiquest
  REMOTE_DIR: /opt/noiquest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='frontend/.env' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.REMOTE_DIR }}/

      - name: Write .env file
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ env.REMOTE_DIR }} && cat > ${{ env.REMOTE_DIR }}/.env << 'ENVEOF'
          ${{ secrets.ENV_FILE }}
          ENVEOF"

      - name: Deploy (Blue-Green)
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /opt/noiquest
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
          EOF

      - name: Send notification
        if: always()
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.FEISHU_WEBHOOK_URL }}
          method: POST
          contentType: application/json
          data: |
            {
              "msg_type": "text",
              "content": {
                "text": "✅ NOIQuest 部署完成\n🔗 仓库: ${{ github.repository }}\n🌿 分支: ${{ github.ref_name }}\n🧪 状态: ${{ job.status }}\n👤 提交人: ${{ github.actor }}"
              }
            }
