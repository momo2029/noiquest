# NOI Quest 监控配置

# Nginx 日志格式增强
log_format enhanced '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

access_log /var/log/nginx/access.log enhanced;

# 请求限制 (防止DDoS)
limit_req_zone $binary_remote_addr zone=noiquest:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=noiquest_api:10m rate=5r/s;

# 客户端请求大小限制
client_max_body_size 10M;
client_body_buffer_size 128k;

# 超时设置
proxy_connect_timeout 60s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;
send_timeout 60s;

# Gzip压缩优化
gzip on;
gzip_vary on;
gzip_min_length 1k;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
gzip_proxied any;
gzip_disable "msie6";

# 缓存静态资源
location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# 健康检查端点
location = /health {
    access_log off;
    return 200 '{"status":"healthy","timestamp":"$time_iso8601","service":"noiquest"}';
    add_header Content-Type application/json;
}

# API速率限制
location /api/ {
    limit_req zone=noiquest_api burst=20 nodelay;
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400;
}

# 前端静态文件
location / {
    try_files $uri $uri/ /index.html;
    # 防止目录遍历
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}