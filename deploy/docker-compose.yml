version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: cplus_postgres
    restart: always
    environment:
      POSTGRES_USER: cplus
      POSTGRES_PASSWORD: CplusDB2024Secure!
      POSTGRES_DB: cplus_master
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cplus_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cplus -d cplus_master"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: cplus_backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://cplus:CplusDB2024Secure!@postgres:5432/cplus_master
      JWT_SECRET: NOIQuestJWTSecret2024SuperSecure!ChangeThis!
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: https://28920.com
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cplus_network
    expose:
      - "3001"

  # 前端
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: cplus_frontend
    restart: always
    networks:
      - cplus_network
    expose:
      - "80"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: cplus_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cplus_network

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: cplus_certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  certbot_data:

networks:
  cplus_network:
    driver: bridge
