version: '3.8'

# 全新安装专用配置
# 与 docker-compose.yml 相同，但会执行数据库种子数据

services:
  # 后端 API（启用种子数据）
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: noiquest_backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
      SEED_DATABASE: "true"
    ports:
      - "3001:3001"

  # 前端
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: noiquest_frontend
    restart: always
    ports:
      - "8080:80"
