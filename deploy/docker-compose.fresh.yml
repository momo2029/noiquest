version: '3.8'

# 全新安装专用配置
# 数据库使用远程 10.0.0.1:5432

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: noiquest_backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@10.0.0.1:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY}
      DOUBAO_API_URL: ${DOUBAO_API_URL}
      DOUBAO_MODEL: ${DOUBAO_MODEL}
      CPPEXEC: ${CPPEXEC}
      CPPEXEC_KEY: ${CPPEXEC_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      SEED_DATABASE: "true"
    networks:
      - noiquest_network
    expose:
      - "3001"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: noiquest_frontend
    restart: always
    networks:
      - noiquest_network
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: noiquest_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot-webroot:/var/www/certbot:ro
      - /opt/noiquest/blog:/var/www/blog
      - /opt/noiquest/recall_ai:/var/www/recall_ai
    depends_on:
      - backend
      - frontend
    networks:
      - noiquest_network

networks:
  noiquest_network:
    driver: bridge
